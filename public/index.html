<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERFA Apprentissage - Redirection</title>
    <script>
        // Redirection intelligente selon l'état d'authentification
        const token = localStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('auth_user') || '{}');
        if (token && user.role === 'cfa') {
            window.location.replace('/dashboard-cfa.html');
        } else if (token && user.role === 'entreprise') {
            window.location.replace('/dashboard-entreprise.html');
        } else {
            window.location.replace('/login.html');
        }
    </script>
</head>
<body>
    <p style="text-align:center;margin-top:40px;font-family:sans-serif;color:#666;">Redirection en cours...</p>
</body>
</html>
