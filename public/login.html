<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CERFA SaaS - Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      color: #fff;
      padding: 32px 32px 24px;
      text-align: center;
    }
    .auth-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .auth-header p {
      font-size: 14px;
      opacity: 0.8;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid #eee;
    }
    .auth-tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .auth-tab.active {
      color: #1e3a5f;
      border-bottom-color: #1e3a5f;
    }
    .auth-tab:hover { color: #1e3a5f; }
    .auth-form {
      padding: 28px 32px 32px;
      display: none;
    }
    .auth-form.active { display: block; }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #667eea;
    }
    .form-group select {
      cursor: pointer;
      background: #fff;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-error {
      background: #fee;
      color: #c00;
      border: 1px solid #fcc;
    }
    .alert-success {
      background: #efe;
      color: #060;
      border: 1px solid #cfc;
    }
    .role-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .role-card {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .role-card:hover { border-color: #667eea; }
    .role-card.selected {
      border-color: #667eea;
      background: #f0f0ff;
    }
    .role-card .icon { font-size: 28px; margin-bottom: 6px; }
    .role-card .label { font-size: 13px; font-weight: 600; color: #333; }
    .role-card .desc { font-size: 11px; color: #888; margin-top: 2px; }
    .role-card .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 4px;
      font-weight: 600;
    }
    .badge-pro { background: #667eea; color: #fff; }
    .badge-free { background: #e0e0e0; color: #666; }
    @media (max-width: 480px) {
      .auth-form { padding: 20px; }
      .auth-header { padding: 24px 20px 18px; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>📋 CERFA Apprentissage</h1>
      <p>Gestion automatisée des contrats d'apprentissage</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Connexion</button>
      <button class="auth-tab" onclick="showTab('register')">Créer un compte</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <div id="loginAlert" class="alert"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="votreemail@exemple.fr">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" required placeholder="••••••••" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Se connecter</button>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
      <div id="registerAlert" class="alert"></div>
      <div class="form-group">
        <label>Type de compte</label>
        <div class="role-cards">
          <div class="role-card selected" onclick="selectRole('cfa')">
            <div class="icon">🏫</div>
            <div class="label">CFA</div>
            <div class="desc">Gérer les contrats</div>
            <span class="badge badge-pro">PRO</span>
          </div>
          <div class="role-card" onclick="selectRole('entreprise')">
            <div class="icon">🏢</div>
            <div class="label">Entreprise</div>
            <div class="desc">Remplir les formulaires</div>
            <span class="badge badge-free">GRATUIT</span>
          </div>
        </div>
        <input type="hidden" id="registerRole" value="cfa">
      </div>
      <div class="form-group">
        <label>Nom / Raison sociale</label>
        <input type="text" id="registerNom" required placeholder="Ex: CFA de Paris">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" required placeholder="votreemail@exemple.fr">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="registerPassword" required placeholder="Min. 6 caractères" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">Créer mon compte</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    const existingToken = localStorage.getItem('auth_token');
    if (existingToken) {
      const userData = JSON.parse(localStorage.getItem('auth_user') || '{}');
      if (userData.role === 'cfa') window.location.href = '/dashboard-cfa.html';
      else if (userData.role === 'entreprise') window.location.href = '/dashboard-entreprise.html';
    }

    let selectedRole = 'cfa';

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelector('.auth-tab:first-child').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelector('.auth-tab:last-child').classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('registerRole').value = role;
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }

    function showAlert(id, message, type) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.className = 'alert alert-' + type;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert('loginAlert', data.error, 'error');
          btn.disabled = false;
          btn.textContent = 'Se connecter';
          return;
        }

        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));

        if (data.user.role === 'cfa') window.location.href = '/dashboard-cfa.html';
        else window.location.href = '/dashboard-entreprise.html';

      } catch (err) {
        showAlert('loginAlert', 'Erreur de connexion au serveur', 'error');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Création...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('registerEmail').value,
            password: document.getElementById('registerPassword').value,
            role: selectedRole,
            nom: document.getElementById('registerNom').value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert('registerAlert', data.error, 'error');
          btn.disabled = false;
          btn.textContent = 'Créer mon compte';
          return;
        }

        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));

        if (data.user.role === 'cfa') window.location.href = '/dashboard-cfa.html';
        else window.location.href = '/dashboard-entreprise.html';

      } catch (err) {
        showAlert('registerAlert', 'Erreur de connexion au serveur', 'error');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    }
  </script>
</body>
</html>
